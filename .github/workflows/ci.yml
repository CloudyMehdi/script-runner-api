name: API ci

on:
    push:
      branches: [ "main" ]
    pull_request:
      branches: [ "main" ]
    workflow_dispatch:

jobs:

  tests:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: 3.14
        
    - name: Install dependencies
      run:
        pip install -r requirements.txt

    - name: Run tests
      run: python3 -m unittest discover tests

  docker-build:
    runs-on: ubuntu-latest
    needs: tests

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Docker build image
        run: docker build -t myapp .

      - name: Run container
        run: |
            docker run -dp 5000:5000 --name test-container myapp
            sleep 10
      # There is an issue here: we cannot make sure the container will start within 10 seconds

      - name: Test health
        run: curl http://localhost:5000/health

    